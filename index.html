<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<script>
  const url = new URLSearchParams(window.location.search);
  if (!url.get('login')) {
    window.location.href = "/html/login.html";
  }
</script>

<div class="layout">
  <aside class="sidebar">
    <div class="logo">企业管理系统</div>
    <ul class="menu">
      <li onclick="go('staff.html')">员工管理</li>
      <li onclick="go('attend.html')">考勤管理</li>
      <li onclick="logout()">退出登录</li>
    </ul>
  </aside>

  <div class="main">
    <iframe id="mainFrame" src="/html/staff.html" class="main-iframe"></iframe>
  </div>
</div>

<script>
function go(url) {
  document.getElementById("mainFrame").src = "/html/" + url;
}
function logout() {
  window.location.href = "/html/login.html";
}
</script>
</body>
</html>
