<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="login-body">
<div class="login-box">
  <h2>企业管理系统</h2>
  <div class="form-item">
    <label>账号</label>
    <input id="username" value="admin">
  </div>
  <div class="form-item">
    <label>密码</label>
    <input id="password" type="password" value="123456">
  </div>
  <button class="login-btn" onclick="login()">登录系统</button>
</div>

<script>
function login() {
  const user = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (user === 'admin' && pwd === '123456') {
    window.location.href = "/index.html?login=ok";
  } else {
    alert('账号或密码错误');
  }
}
</script>
</body>
</html>
